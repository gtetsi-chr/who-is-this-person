<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>AI Πληροφορίες</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f4f4f4; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        select, button { padding: 10px; margin: 10px; width: 100%; border-radius: 5px; border: 1px solid #ccc; }
        #result { margin-top: 20px; padding: 15px; border-top: 2px solid #eee; min-height: 50px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Επίλεξε Πρόσωπο</h2>
    <select id="personList">
        <option value="Σωκράτης">Σωκράτης</option>
        <option value="Μέγας Αλέξανδρος">Μέγας Αλέξανδρος</option>
        <option value="Νίκος Καζαντζάκης">Νίκος Καζαντζάκης</option>
    </select>
    <button onclick="askAI()">Ποιος είναι αυτός;</button>

    <div id="result">Η απάντηση θα εμφανιστεί εδώ...</div>
</div>

<script>
    async function askAI() {
        const name = document.getElementById('personList').value;
        const resultDiv = document.getElementById('result');
        resultDiv.innerText = "Σκέφτομαι...";

        try {
            const response = await fetch('https://person-lookup-api.gtetsi.workers.dev', { // <-- ΒΑΛΕ ΤΟ URL ΤΟΥ WORKER ΣΟΥ
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });
            const data = await response.json();
            resultDiv.innerText = data.text;
        } catch (error) {
            resultDiv.innerText = "Ωχ! Κάτι πήγε στραβά.";
        }
    }
</script>

</body>
</html>
